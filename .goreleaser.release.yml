# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: megacli

snapshot:
  version_template: "0.0.0-{{ .Timestamp }}"

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/megacli/megacli/internal/version.Version={{.Version}}
    flags:
      - -trimpath

archives:
  - name_template: >-
      megacli_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    wrap_in_directory: true
    files:
      - README*
      - LICENSE*
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  prerelease: auto
  footer: |
    ## Installation

    ### Quick Install (recommended)

    **Windows (PowerShell):**
    ```powershell
    irm https://raw.githubusercontent.com/rorikonn/MegaCLI/main/scripts/install.ps1 | iex
    ```

    **macOS / Linux:**
    ```bash
    curl -sSf https://raw.githubusercontent.com/rorikonn/MegaCLI/main/scripts/install.sh | sh
    ```

    ### Manual
    Download the archive for your platform, extract it, and place the binary in your PATH.
